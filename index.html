<!DOCTYPE html>
<html>
<head>
    <title>Dailymotion CAF Receiver</title>
    <script src="//www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
        }
        cast-media-player {
            --theme-hue: 210;
            --splash-image-background: #000000;
        }
    </style>
</head>
<body>
    <cast-media-player></cast-media-player>
    
    <script>
        const context = cast.framework.CastReceiverContext.getInstance();
        const playerManager = context.getPlayerManager();

        const playbackConfig = new cast.framework.PlaybackConfig();

        playerManager.setMessageInterceptor(
            cast.framework.messages.MessageType.LOAD,
            request => {
                if (request.media) {
                    const url = request.media.contentUrl || '';
                    const type = request.media.contentType || '';

                    if (url.includes('.m3u8') || type.includes('mpegurl')) {
                        request.media.hlsSegmentFormat = cast.framework.messages.HlsSegmentFormat.FMP4;
                        request.media.contentType = 'application/vnd.apple.mpegurl';
                    }
                }
                return request;
            }
        );

        context.start({ playbackConfig: playbackConfig });
    </script>
</body>
</html>
